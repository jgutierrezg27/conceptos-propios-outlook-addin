<!doctype html><html lang="es"><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Conceptos Colegiatura</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>:root{--panel-bg:#575756;--card-bg:rgba(255, 255, 255, 0.05);--card-border:rgba(255, 255, 255, 0.08);--text-primary:#ffffff;--text-secondary:rgba(255, 255, 255, 0.65);--accent:#ffcf44;--accent-hover:#ffd54f;--accent-text:#575756}body,html{width:100%;height:100%;margin:0;padding:0}*{box-sizing:border-box}.taskpane-body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;background-color:var(--panel-bg);color:var(--text-primary);min-height:100vh}.taskpane-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.action-card{width:min(100%,320px);text-align:center;background-color:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:20px}.logo-badge{width:64px;height:64px;margin:0 auto 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-hover));box-shadow:0 6px 20px rgba(255,207,68,.25)}.logo-image{width:36px;height:36px;object-fit:contain}.panel-title{margin:0 0 6px;font-size:16px;font-weight:600;color:var(--text-primary)}.panel-description{margin:0 0 20px;font-size:12px;line-height:1.5;color:var(--text-secondary)}.btn-normalizar{width:100%;border:0;border-radius:8px;background-color:var(--accent);color:var(--accent-text);font-size:14px;font-weight:700;line-height:1.2;padding:13px 20px;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s ease,background-color .2s ease}.btn-normalizar:focus-visible,.btn-normalizar:hover{background-color:var(--accent-hover);transform:translateY(-1px)}.btn-normalizar:focus-visible{outline:2px solid #ffffff;outline-offset:2px}.status-box{margin-top:16px;padding:10px;border-radius:6px;display:none;font-size:12px;text-align:left}.status-box p{margin:0}@media (max-width:380px){.action-card{padding:16px}}</style><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body class="taskpane-body"><main class="taskpane-shell" aria-label="Panel de normalización"><section class="action-card" aria-labelledby="panel-title"><div class="logo-badge" aria-hidden="true"><img src="assets/logo.png" alt="" class="logo-image"/></div><h1 id="panel-title" class="panel-title">Corrección de conceptos</h1><p class="panel-description">Estandariza la terminología institucional en tu documento.</p><button id="btn-normalizar" type="button" class="btn-normalizar" aria-live="polite"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg> Corregir documento</button><div id="status" class="status-box" role="status" aria-live="polite"><p id="status-message"></p></div></section></main></body></html>
